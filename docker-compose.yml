version: "3.9"

# ── Role-Based Ticket Management System — Docker Compose ─────────────────────
#
# Development:   docker compose up
# Production:    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required env vars (copy .env.example → .env in the project root):
#   MONGODB_URI, JWT_SECRET, JWT_REFRESH_SECRET, CORS_ORIGIN, EMAIL_FROM

services:
  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: ticket-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:?Set MONGO_ROOT_USER in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Set MONGO_ROOT_PASSWORD in .env}
      MONGO_INITDB_DATABASE: ticket-system
    volumes:
      - mongo_data:/data/db
    # NOTE: MongoDB port is NOT exposed to the host in the base config.
    # For local dev access, use docker-compose.dev.yml which binds 27017.
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ticket-net

  # ── API Server ───────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: ticket-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV:            ${NODE_ENV:-production}
      PORT:                5000
      MONGODB_URI:         mongodb://${MONGO_ROOT_USER:?Set MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD:?Set MONGO_ROOT_PASSWORD}@mongo:27017/ticket-system?authSource=admin
      JWT_SECRET:          ${JWT_SECRET}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET}
      JWT_EXPIRE:          ${JWT_EXPIRE:-15m}
      JWT_REFRESH_EXPIRE:  ${JWT_REFRESH_EXPIRE:-7d}
      BCRYPT_ROUNDS:       ${BCRYPT_ROUNDS:-12}
      CORS_ORIGIN:         ${CORS_ORIGIN:-http://localhost}
      TRUST_PROXY:         1
      EMAIL_FROM:          ${EMAIL_FROM}
      EMAIL_SERVICE:       ${EMAIL_SERVICE:-}
      EMAIL_USER:          ${EMAIL_USER:-}
      EMAIL_PASSWORD:      ${EMAIL_PASSWORD:-}
      CLIENT_URL:          ${CLIENT_URL:-http://localhost}
      LOG_LEVEL:           ${LOG_LEVEL:-info}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ticket-net

  # ── React Client (served via nginx) ─────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api/v1}
    container_name: ticket-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - ticket-net

volumes:
  mongo_data:
    driver: local

networks:
  ticket-net:
    driver: bridge
