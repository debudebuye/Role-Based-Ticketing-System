# ── nginx configuration for the React SPA ────────────────────────────────────
#
# HTTP → HTTPS redirect (only active when SSL_ENABLED=true in docker-compose).
# In plain HTTP deployments (e.g. behind an SSL-terminating load balancer like
# AWS ALB or Cloudflare) only the second server block is used.
#
# SSL cert paths are set via environment-variable substitution at container
# startup — see docker-compose.prod.yml for how the certs are mounted.

# HTTP — redirect to HTTPS in production; keep plain HTTP for local/LB setups.
server {
    listen 80;
    server_name _;

    # Health check used by Docker / load balancers — must stay on HTTP
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # In production with TLS, redirect everything else to HTTPS.
    # Comment this block out (or remove it) when SSL is terminated upstream
    # (e.g. Cloudflare, AWS ALB) so nginx only needs to serve HTTP.
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main application server
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ── TLS certificates ──────────────────────────────────────────────────────
    # Mount certs into the container via docker-compose.prod.yml volumes, e.g.:
    #   - /etc/letsencrypt/live/yourdomain.com/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
    #   - /etc/letsencrypt/live/yourdomain.com/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Static asset caching (Vite hashes filenames) ──────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback — all routes serve index.html ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
